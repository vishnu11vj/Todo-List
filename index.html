<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo List</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh; background: #f5f0e8;
    font-family: 'DM Sans', sans-serif;
    background-image: radial-gradient(circle at 10% 20%, #e8ddd0 0%, transparent 40%),
                      radial-gradient(circle at 90% 80%, #dde8d0 0%, transparent 40%);
  }
  .container { max-width: 560px; margin: 0 auto; padding: 60px 20px; }
  h1 { font-family: 'Playfair Display'; font-size: 48px; color: #1a1a1a; margin-bottom: 6px; }
  .subtitle { color: #888; font-size: 14px; margin-bottom: 36px; font-weight: 300; }
  .input-row {
    display: flex; gap: 10px; margin-bottom: 32px;
  }
  input {
    flex: 1; padding: 14px 18px; border: 2px solid #e0d8cc;
    border-radius: 12px; font-family: 'DM Sans'; font-size: 15px;
    background: #fff; outline: none; transition: border 0.2s;
    color: #1a1a1a;
  }
  input:focus { border-color: #c0a882; }
  input::placeholder { color: #bbb; }
  button.add-btn {
    padding: 14px 24px; background: #1a1a1a; color: #fff;
    border: none; border-radius: 12px; font-family: 'DM Sans';
    font-size: 15px; font-weight: 500; cursor: pointer; transition: background 0.2s;
    white-space: nowrap;
  }
  button.add-btn:hover { background: #333; }
  .filters { display: flex; gap: 8px; margin-bottom: 20px; }
  .filter-btn {
    padding: 6px 16px; border-radius: 20px; border: 1.5px solid #ddd;
    background: transparent; font-family: 'DM Sans'; font-size: 13px;
    cursor: pointer; color: #888; transition: all 0.2s;
  }
  .filter-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .todo-list { display: flex; flex-direction: column; gap: 10px; }
  .todo-item {
    background: #fff; border-radius: 14px; padding: 16px 18px;
    display: flex; align-items: center; gap: 14px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    animation: fadeIn 0.25s ease; transition: transform 0.15s;
  }
  .todo-item:hover { transform: translateX(4px); }
  @keyframes fadeIn { from { opacity:0; transform: translateY(-8px); } to { opacity:1; transform: translateY(0); } }
  .check {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid #ddd; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; background: transparent;
  }
  .check.done { background: #4caf50; border-color: #4caf50; }
  .check.done::after { content: '✓'; color: #fff; font-size: 12px; font-weight: bold; }
  .todo-text { flex: 1; font-size: 15px; color: #1a1a1a; transition: all 0.2s; }
  .todo-text.done { text-decoration: line-through; color: #bbb; }
  .del-btn {
    background: none; border: none; color: #ccc; cursor: pointer;
    font-size: 18px; padding: 2px 6px; border-radius: 6px; transition: all 0.2s;
  }
  .del-btn:hover { color: #e05050; background: #fff0f0; }
  .empty { text-align: center; color: #bbb; padding: 40px; font-size: 14px; }
  .count { font-size: 13px; color: #aaa; margin-top: 16px; text-align: center; }
</style>
</head>
<body>
<div class="container">
  <h1>My Tasks</h1>
  <p class="subtitle" id="dateStr"></p>
  <div class="input-row">
    <input id="taskInput" type="text" placeholder="Add a new task..." onkeydown="if(event.key==='Enter')addTask()">
    <button class="add-btn" onclick="addTask()">+ Add</button>
  </div>
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('active',this)">Active</button>
    <button class="filter-btn" onclick="setFilter('done',this)">Completed</button>
  </div>
  <div class="todo-list" id="list"></div>
  <div class="count" id="count"></div>
</div>
<script>
  let tasks = JSON.parse(localStorage.getItem('tasks')||'[]');
  let filter = 'all';
  document.getElementById('dateStr').textContent = new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});

  function save() { localStorage.setItem('tasks', JSON.stringify(tasks)); }
  function addTask() {
    const v = document.getElementById('taskInput').value.trim();
    if (!v) return;
    tasks.unshift({ id: Date.now(), text: v, done: false });
    document.getElementById('taskInput').value = '';
    save(); render();
  }
  function toggle(id) {
    tasks = tasks.map(t => t.id===id ? {...t, done:!t.done} : t);
    save(); render();
  }
  function del(id) {
    tasks = tasks.filter(t => t.id!==id);
    save(); render();
  }
  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }
  function render() {
    const list = document.getElementById('list');
    const filtered = tasks.filter(t => filter==='all' ? true : filter==='done' ? t.done : !t.done);
    if (!filtered.length) { list.innerHTML = '<div class="empty">No tasks here ✨</div>'; }
    else list.innerHTML = filtered.map(t => `
      <div class="todo-item">
        <div class="check ${t.done?'done':''}" onclick="toggle(${t.id})"></div>
        <span class="todo-text ${t.done?'done':''}">${t.text}</span>
        <button class="del-btn" onclick="del(${t.id})">×</button>
      </div>`).join('');
    const done = tasks.filter(t=>t.done).length;
    document.getElementById('count').textContent = tasks.length ? `${done} of ${tasks.length} completed` : '';
  }
  render();
</script>
</body>
</html>
